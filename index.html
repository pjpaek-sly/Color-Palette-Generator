<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LCH Color Palette Generator</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-content">
        <h1>LCH Color Palette Generator</h1>
        <p class="subtitle">Perceptually uniform color scales using the LCH color space</p>
      </div>
    </header>

    <section class="controls">
      <div class="controls-row">
        <div class="control-group">
          <label for="stops-select">Stops</label>
          <select id="stops-select"></select>
        </div>
      </div>
    </section>

    <section class="lightness-viz">
      <div class="viz-header">
        <h2>Lightness Distribution</h2>
        <button id="reset-lightness-btn" class="btn btn-reset" hidden>Reset to Default</button>
      </div>
      <div id="lightness-chart" class="lightness-chart"></div>
      <div class="viz-legend">
        <span class="viz-legend-item viz-legend-light">Light mode zone (L &gt; 55)</span>
        <span class="viz-legend-item viz-legend-dark">Dark mode zone (L &le; 55)</span>
      </div>
    </section>

    <section class="master-colors">
      <div class="section-header">
        <h2>Master Colors</h2>
        <button id="add-color-btn" class="btn btn-add">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Add Color
        </button>
      </div>
      <div id="color-inputs" class="color-inputs"></div>
    </section>

    <section id="palettes" class="palettes"></section>

    <div id="toast" class="toast"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
